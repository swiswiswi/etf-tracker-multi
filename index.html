<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF 存股投資追蹤 (多帳)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #111; color: #e0e0e0; -webkit-text-size-adjust: 100%; }

#login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #111; }
.login-box { background: #1a1a1a; padding: 32px 24px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); text-align: center; width: 300px; border: 1px solid #333; }
.login-box h1 { font-size: 20px; margin-bottom: 8px; color: #fff; }
.login-box p { font-size: 13px; color: #666; margin-bottom: 24px; }
.login-box input { width: 100%; padding: 14px; border: 1px solid #333; border-radius: 8px; font-size: 20px; text-align: center; letter-spacing: 8px; outline: none; background: #222; color: #fff; }
.login-box input:focus { border-color: #00d4aa; }
.login-box button { width: 100%; margin-top: 16px; padding: 14px; background: #fff; color: #111; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600; }
.login-error { color: #ff4757; font-size: 13px; margin-top: 8px; display: none; }

#app { display: none; max-width: 1400px; margin: 0 auto; padding: 12px; }
header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; margin-bottom: 16px; }
header h1 { font-size: 15px; white-space: nowrap; color: #fff; }
.header-actions button { padding: 10px 20px; border: none; border-radius: 8px; background: #fff; color: #111; cursor: pointer; font-size: 14px; font-weight: 600; }
.sync-status { font-size: 11px; color: #666; margin-top: 4px; text-align: right; }
.sync-status.synced { color: #00d4aa; }
.sync-status.error { color: #ff4757; }

.page-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid #333; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.page-tab { padding: 10px 16px; cursor: pointer; font-size: 14px; border: 1px solid transparent; border-bottom: none; border-radius: 8px 8px 0 0; background: #1a1a1a; color: #888; margin-bottom: -1px; white-space: nowrap; min-width: 80px; text-align: center; }
.page-tab.active { background: #222; border-color: #333; font-weight: 600; color: #00d4aa; }
.tab-add { padding: 10px 14px; cursor: pointer; font-size: 18px; color: #555; border: none; background: none; min-width: 44px; }
.tab-close { margin-left: 6px; font-size: 14px; color: #555; }

.settings-panel { background: #1a1a1a; border-radius: 10px; padding: 16px; margin-bottom: 16px; border: 1px solid #2a2a2a; }
.settings-panel h2 { font-size: 15px; margin-bottom: 12px; cursor: pointer; user-select: none; color: #ccc; }
.settings-panel h2::before { content: "▼ "; font-size: 11px; }
.settings-panel.collapsed h2::before { content: "▶ "; }
.settings-panel.collapsed .settings-grid,
.settings-panel.collapsed .derived-values { display: none; }
.settings-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
.setting-item { display: flex; flex-direction: column; gap: 4px; }
.setting-item label { font-size: 12px; color: #888; }
.setting-item input { padding: 10px; border: 1px solid #333; border-radius: 8px; font-size: 16px; -webkit-appearance: none; background: #222; color: #e0e0e0; }
.setting-item .hint { font-size: 11px; color: #555; }
.derived-values { margin-top: 12px; padding-top: 12px; border-top: 1px solid #2a2a2a; font-size: 12px; display: flex; flex-direction: column; gap: 4px; color: #999; }
.derived-values span { color: #00d4aa; font-weight: 600; }

.chart-container { background: #1a1a1a; border-radius: 10px; padding: 8px; margin-bottom: 16px; border: 1px solid #2a2a2a; }
.chart-container canvas { max-height: 200px; }

.summary-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
.summary-card { background: #1a1a1a; border-radius: 10px; padding: 12px; border: 1px solid #2a2a2a; }
.summary-card .label { font-size: 11px; color: #666; }
.summary-card .value { font-size: 18px; font-weight: 700; margin-top: 2px; color: #fff; }
.summary-card .sub { font-size: 11px; color: #555; margin-top: 2px; }

.table-container { background: #1a1a1a; border-radius: 10px; padding: 16px; border: 1px solid #2a2a2a; overflow-x: auto; }
.table-container h2 { font-size: 15px; margin-bottom: 12px; color: #ccc; }
.table-actions { display: flex; gap: 8px; margin-bottom: 12px; }
.table-actions button { padding: 10px 16px; border: 1px solid #333; border-radius: 8px; background: #222; color: #ccc; cursor: pointer; font-size: 14px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #1e1e1e; padding: 10px 8px; text-align: right; border-bottom: 1px solid #333; white-space: nowrap; font-size: 12px; color: #888; }
th:nth-child(1), th:nth-child(2) { text-align: center; }
td { padding: 8px; text-align: right; border-bottom: 1px solid #222; }
td:nth-child(1) { text-align: center; font-weight: 600; color: #00d4aa; }
td:nth-child(2) { text-align: center; }
td input { width: 100%; padding: 4px 6px; border: 1px solid #333; border-radius: 4px; font-size: 13px; text-align: right; background: #222; color: #e0e0e0; }
td input[type="date"] { text-align: center; }
.calculated { color: #888; }
.path-value { color: #00d4aa; font-weight: 500; }
.positive { color: #00d4aa; }
.negative { color: #ff4757; }
.delete-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 16px; padding: 2px 6px; }

.cards-container { display: none; }
.month-card { background: #1a1a1a; border-radius: 10px; padding: 12px; margin-bottom: 10px; border: 1px solid #2a2a2a; border-left: 3px solid #00d4aa; overflow: hidden; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 4px; }
.card-month { font-size: 14px; font-weight: 700; color: #00d4aa; white-space: nowrap; }
.card-delete { background: none; border: none; color: #555; font-size: 20px; padding: 4px; cursor: pointer; flex-shrink: 0; }
.card-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
.card-field { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.card-field label { font-size: 11px; color: #666; }
.card-field input { padding: 6px; border: 1px solid #333; border-radius: 6px; font-size: 13px; min-height: 40px; -webkit-appearance: none; width: 100%; max-width: 100%; background: #222; color: #e0e0e0; }
.card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; font-size: 10px; color: #888; overflow: hidden; word-break: break-all; }
.card-stats .stat-label { color: #666; }
.card-stats .stat-val { font-weight: 600; color: #ccc; }
.card-stats .highlight { color: #00d4aa; }
.card-return { font-size: 14px; font-weight: 700; text-align: right; margin-top: 6px; }

.gas-config { display: none; }

.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal-box { background: #1a1a1a; padding: 24px; border-radius: 12px; width: 320px; margin: 0 16px; border: 1px solid #333; }
.modal-box h3 { margin-bottom: 12px; color: #fff; }
.modal-box input { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 8px; font-size: 16px; margin-bottom: 12px; background: #222; color: #e0e0e0; }
.modal-box .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-box button { padding: 10px 16px; border: 1px solid #333; border-radius: 8px; background: #222; color: #ccc; cursor: pointer; font-size: 14px; }
.modal-box button.primary { background: #fff; color: #111; border-color: #fff; }

@media (min-width: 769px) {
  #app { padding: 16px; }
  header h1 { font-size: 22px; }
  .settings-grid { grid-template-columns: repeat(3, 1fr); }
  .setting-item { flex-direction: row; align-items: center; gap: 8px; }
  .setting-item label { min-width: 80px; }
  .derived-values { flex-direction: row; gap: 24px; }
  .summary-cards { grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .summary-card .value { font-size: 20px; }
  .chart-container { padding: 20px; }
  .chart-container canvas { max-height: 300px; }
}

@media (max-width: 768px) {
  .table-container table,
  .table-container thead,
  .table-container .table-actions { display: none; }
  .cards-container { display: block; }
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>ETF 存股追蹤</h1>
    <p>多帳管理版</p>
    <input type="password" id="password-input" maxlength="4" placeholder="密碼" autofocus>
    <button onclick="tryLogin()">登入</button>
    <div class="login-error" id="login-error">密碼錯誤</div>
  </div>
</div>

<div id="app">
  <header>
    <h1>ETF 存股投資追蹤</h1>
    <div>
      <div class="header-actions">
        <button onclick="saveToSheet()">儲存</button>
      </div>
      <div class="sync-status" id="sync-status"></div>
    </div>
  </header>

  <div class="gas-config" id="gas-config">
    <input type="text" id="gas-url">
  </div>

  <div class="page-tabs" id="page-tabs"></div>

  <div id="page-content">
    <div class="settings-panel collapsed" id="settings-panel">
      <h2 onclick="toggleSettings()">投資參數設定</h2>
      <div class="settings-grid">
        <div class="setting-item"><label>目標金額</label><input type="number" id="s-target" onchange="onSettingsChange()"></div>
        <div class="setting-item"><label>目前金額</label><input type="number" id="s-current" onchange="onSettingsChange()"></div>
        <div class="setting-item"><label>投資月數</label><input type="number" id="s-months" onchange="onSettingsChange()"><span class="hint">建議120+</span></div>
        <div class="setting-item"><label>月報酬率</label><input type="number" id="s-return" step="0.0001" onchange="onSettingsChange()"><span class="hint">年報酬x0.7/12</span></div>
        <div class="setting-item"><label>月通膨率</label><input type="number" id="s-inflation" step="0.0001" onchange="onSettingsChange()"><span class="hint">通常3%/12</span></div>
        <div class="setting-item"><label>目標 ETF</label><input type="text" id="s-etf" onchange="onSettingsChange()"></div>
      </div>
      <div class="derived-values">
        <div>R = <span id="d-R">-</span></div>
        <div>每月基礎投入 $C = <span id="d-C">-</span></div>
      </div>
    </div>

    <div class="summary-cards" id="summary-cards"></div>

    <div class="chart-container"><canvas id="chart"></canvas></div>

    <div class="table-container">
      <h2>月投資紀錄</h2>
      <div style="margin-bottom:12px;"><button onclick="addRow()" style="width:100%;padding:12px;border:1px dashed #444;border-radius:8px;background:#1a1a1a;color:#ccc;font-size:14px;cursor:pointer;">+ 新增月份</button></div>
      <div class="cards-container" id="cards-container"></div>
      <div class="table-actions"><button onclick="addRow()">+ 新增月份</button></div>
      <table>
        <thead><tr><th>月</th><th>購買日期</th><th>存股路徑</th><th>股價</th><th>累計市值</th><th>應買股數</th><th>實際股數</th><th>投資金額</th><th>投資累計</th><th>股數累計</th><th>庫存現值</th><th>投報率</th><th></th></tr></thead>
        <tbody id="data-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="rename-modal">
  <div class="modal-box">
    <h3>重新命名</h3>
    <input type="text" id="rename-input" placeholder="頁面名稱">
    <div class="modal-actions">
      <button onclick="closeRenameModal()">取消</button>
      <button class="primary" onclick="confirmRename()">確定</button>
    </div>
  </div>
</div>

<script>
const PASSWORD = '1229';
const STORAGE_KEY = 'etf-tracker-multi-data';
const GAS_URL_KEY = 'etf-tracker-multi-gas-url';

let pages = [{ name: '頁面 1', settings: { target: 10000000, current: 0, months: 120, monthlyReturn: 0.0085, monthlyInflation: 0.0025, etf: '' }, entries: [] }];
let currentPageIndex = 0, chart = null, hasUnsavedChanges = false, renamingIndex = -1;

function markDirty() { hasUnsavedChanges = true; }
function isMobile() { return window.innerWidth <= 768; }
window.addEventListener('beforeunload', e => { if (hasUnsavedChanges) { e.preventDefault(); e.returnValue = ''; } });

function tryLogin() {
  if (document.getElementById('password-input').value === PASSWORD) { sessionStorage.setItem('etf-multi-authed', '1'); showApp(); }
  else document.getElementById('login-error').style.display = 'block';
}
document.getElementById('password-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadFromStorage(); renderTabs(); switchPage(0); loadFromSheet();
}

function renderTabs() {
  document.getElementById('page-tabs').innerHTML = pages.map((p, i) => `
    <div class="page-tab ${i === currentPageIndex ? 'active' : ''}" onclick="switchPage(${i})" ondblclick="openRenameModal(${i})">
      ${p.name}${pages.length > 1 ? `<span class="tab-close" onclick="event.stopPropagation();deletePage(${i})">×</span>` : ''}
    </div>`).join('') + '<button class="tab-add" onclick="addPage()">+</button>';
}

function switchPage(i) { currentPageIndex = i; renderTabs(); loadPageToUI(); render(); }

function addPage() {
  pages.push({ name: '頁面 ' + (pages.length + 1), settings: { target: 10000000, current: 0, months: 120, monthlyReturn: 0.0085, monthlyInflation: 0.0025, etf: '' }, entries: [] });
  switchPage(pages.length - 1); markDirty();
}

function deletePage(i) {
  if (pages.length <= 1 || !confirm(`刪除「${pages[i].name}」？`)) return;
  pages.splice(i, 1);
  if (currentPageIndex >= pages.length) currentPageIndex = pages.length - 1;
  switchPage(currentPageIndex); markDirty();
}

function openRenameModal(i) { renamingIndex = i; document.getElementById('rename-input').value = pages[i].name; document.getElementById('rename-modal').classList.add('show'); document.getElementById('rename-input').focus(); }
function closeRenameModal() { document.getElementById('rename-modal').classList.remove('show'); }
function confirmRename() { const n = document.getElementById('rename-input').value.trim(); if (n && renamingIndex >= 0) { pages[renamingIndex].name = n; renderTabs(); saveToStorage(); markDirty(); } closeRenameModal(); }
document.getElementById('rename-input').addEventListener('keydown', e => { if (e.key === 'Enter') confirmRename(); });

function loadPageToUI() {
  const s = pages[currentPageIndex].settings;
  document.getElementById('s-target').value = s.target; document.getElementById('s-current').value = s.current;
  document.getElementById('s-months').value = s.months; document.getElementById('s-return').value = s.monthlyReturn;
  document.getElementById('s-inflation').value = s.monthlyInflation; document.getElementById('s-etf').value = s.etf;
}

function getCurrentSettings() { return pages[currentPageIndex].settings; }
function getCurrentEntries() { return pages[currentPageIndex].entries; }

function getR() { const s = getCurrentSettings(); return (s.monthlyReturn + s.monthlyInflation) / 2; }
function getC() { const R = getR(), s = getCurrentSettings(); return s.target / (s.months * Math.pow(1 + R, s.months)); }
function getPath(m) { return getC() * m * Math.pow(1 + getR(), m); }

function computeAll() {
  const entries = getCurrentEntries(), results = [];
  for (let i = 0; i < entries.length; i++) {
    const e = entries[i], path = getPath(e.month), price = e.price || 0, actualShares = e.shares || 0;
    const prev = i > 0 ? results[i-1] : null;
    const prevCS = prev ? prev.cumulativeShares : 0, prevCI = prev ? prev.cumulativeInvestment : 0;
    const marketValueBefore = prevCS * price;
    const suggestedShares = price > 0 ? (path - marketValueBefore) / price : 0;
    const investmentAmount = price * actualShares;
    const cumulativeInvestment = prevCI + investmentAmount;
    const cumulativeShares = prevCS + actualShares;
    const currentValue = price * cumulativeShares;
    const returnRate = currentValue > 0 && cumulativeInvestment > 0 ? (currentValue - cumulativeInvestment) / cumulativeInvestment : 0;
    results.push({ month: e.month, path, price, marketValueBefore, suggestedShares, actualShares, investmentAmount, cumulativeInvestment, cumulativeShares, currentValue, returnRate });
  }
  return results;
}

function fmt(n, d = 0) { return n == null || isNaN(n) ? '-' : n.toLocaleString('zh-TW', { minimumFractionDigits: d, maximumFractionDigits: d }); }
function fmtPct(n) { return n == null || isNaN(n) ? '-' : (n * 100).toFixed(2) + '%'; }
function fmtShort(n) { if (n >= 1e8) return '$' + (n/1e8).toFixed(1) + '億'; if (n >= 1e4) return '$' + (n/1e4).toFixed(0) + '萬'; return '$' + fmt(n); }

function render() { updateDerivedValues(); renderTable(); renderCards(); renderChart(); renderSummary(); saveToStorage(); markDirty(); }

function updateDerivedValues() { document.getElementById('d-R').textContent = getR().toFixed(6); document.getElementById('d-C').textContent = fmt(Math.round(getC())); }

function renderTable() {
  const entries = getCurrentEntries(), results = computeAll();
  document.getElementById('data-tbody').innerHTML = results.map((r, i) => `
    <tr><td>${r.month}</td>
    <td><input type="date" value="${entries[i].date||''}" onchange="updateEntry(${i},'date',this.value)"></td>
    <td class="path-value">${fmt(r.path)}</td>
    <td><input type="number" value="${entries[i].price||''}" step="0.01" onchange="updateEntry(${i},'price',parseFloat(this.value))" style="width:80px"></td>
    <td class="calculated">${fmt(r.marketValueBefore)}</td><td class="calculated">${fmt(r.suggestedShares,0)}</td>
    <td><input type="number" value="${entries[i].shares||''}" step="1" onchange="updateEntry(${i},'shares',parseInt(this.value))" style="width:80px"></td>
    <td class="calculated">${fmt(r.investmentAmount)}</td><td class="calculated">${fmt(r.cumulativeInvestment)}</td>
    <td class="calculated">${fmt(r.cumulativeShares)}</td><td class="calculated">${fmt(r.currentValue)}</td>
    <td class="${r.returnRate>=0?'positive':'negative'}">${r.price>0?fmtPct(r.returnRate):'-'}</td>
    <td><button class="delete-btn" onclick="deleteRow(${i})">×</button></td></tr>`).join('');
}

function renderCards() {
  const entries = getCurrentEntries(), results = computeAll();
  const indices = results.map((_,i)=>i).reverse();
  document.getElementById('cards-container').innerHTML = indices.map(i => { const r = results[i]; return `
    <div class="month-card">
      <div class="card-header">
        <span class="card-month">第 ${r.month} 月</span>
        <div style="display:flex;align-items:center;gap:4px;">
          <input type="date" value="${entries[i].date||''}" onchange="updateEntry(${i},'date',this.value)" style="padding:4px;border:1px solid #ddd;border-radius:6px;font-size:12px;max-width:130px;">
          <button class="card-delete" onclick="deleteRow(${i})">×</button>
        </div>
      </div>
      <div class="card-inputs">
        <div class="card-field"><label>股價</label><input type="number" value="${entries[i].price||''}" step="0.01" onchange="updateEntry(${i},'price',parseFloat(this.value))"></div>
        <div class="card-field"><label>實際股數</label><input type="number" value="${entries[i].shares||''}" step="1" onchange="updateEntry(${i},'shares',parseInt(this.value))"></div>
      </div>
      <div class="card-stats">
        <div><span class="stat-label">存股路徑</span> <span class="stat-val highlight">${fmt(r.path)}</span></div>
        <div><span class="stat-label">應買股數</span> <span class="stat-val">${fmt(r.suggestedShares,0)}</span></div>
        <div><span class="stat-label">投資累計</span> <span class="stat-val">$${fmt(r.cumulativeInvestment)}</span></div>
        <div><span class="stat-label">庫存現值</span> <span class="stat-val">$${fmt(r.currentValue)}</span></div>
      </div>
      ${r.price>0?`<div class="card-return ${r.returnRate>=0?'positive':'negative'}">${fmtPct(r.returnRate)}</div>`:''}
    </div>`; }).join('');
}

function renderChart() {
  const s = getCurrentSettings(), entries = getCurrentEntries(), results = computeAll(), mobile = isMobile();
  const lastMonth = entries.length > 0 ? entries[entries.length - 1].month : 0;
  const showMonths = mobile ? Math.max(lastMonth + 3, 12) : s.months;
  const months = [], pathData = [], actualData = [];
  for (let m = 1; m <= showMonths; m++) {
    months.push(m); pathData.push(Math.round(getPath(m)));
    const entry = results.find(r => r.month === m);
    actualData.push(entry && entry.price > 0 ? Math.round(entry.currentValue) : null);
  }
  const ctx = document.getElementById('chart').getContext('2d');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'line',
    data: { labels: months, datasets: [
      { label: '存股路徑', data: pathData, borderColor: '#555', backgroundColor: 'rgba(85,85,85,0.1)', fill: true, tension: 0.3, pointRadius: 0, borderWidth: 2 },
      { label: '實際現值', data: actualData, borderColor: '#00d4aa', backgroundColor: 'rgba(0,212,170,0.1)', fill: false, tension: 0.1, pointRadius: mobile?5:4, borderWidth: 2, spanGaps: false }
    ]},
    options: { responsive: true, maintainAspectRatio: true,
      plugins: { legend: { position: 'top', labels: { boxWidth: 12, font: { size: mobile?11:12 }, color: '#888' } }, tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${fmtShort(ctx.parsed.y)}` } } },
      scales: { x: { title: { display: !mobile, color: '#666' }, ticks: { maxTicksLimit: mobile?6:12, color: '#666' }, grid: { color: '#222' } }, y: { title: { display: !mobile, color: '#666' }, ticks: { callback: v => fmtShort(v), maxTicksLimit: mobile?5:8, color: '#666' }, grid: { color: '#222' } } }
    }
  });
}

function renderSummary() {
  const s = getCurrentSettings(), results = computeAll(), last = results.length > 0 ? results[results.length-1] : null;
  const c = document.getElementById('summary-cards');
  if (!last || last.price === 0) { c.innerHTML = '<div class="summary-card"><div class="label">尚無資料</div><div class="value">-</div></div>'; return; }
  const progress = (last.currentValue / s.target * 100).toFixed(1);
  c.innerHTML = `
    <div class="summary-card"><div class="label">庫存現值</div><div class="value">$${fmt(last.currentValue)}</div><div class="sub">投入 $${fmt(last.cumulativeInvestment)}</div></div>
    <div class="summary-card"><div class="label">投報率</div><div class="value" style="color:${last.returnRate>=0?'#27ae60':'#e74c3c'}">${fmtPct(last.returnRate)}</div><div class="sub">進度 ${progress}%</div></div>
    <div class="summary-card"><div class="label">累計股數</div><div class="value">${fmt(last.cumulativeShares)}</div><div class="sub">${s.etf}</div></div>
    <div class="summary-card"><div class="label">剩餘</div><div class="value">${s.months-last.month} 月</div><div class="sub">已投 ${last.month} 月</div></div>`;
}

function updateEntry(i, f, v) { getCurrentEntries()[i][f] = v; render(); }
function addRow() {
  const e = getCurrentEntries(), lm = e.length > 0 ? e[e.length-1].month : 0;
  e.push({ month: lm+1, date: '', price: null, shares: null }); render();
  if (isMobile()) document.getElementById('cards-container').firstElementChild?.scrollIntoView({behavior:'smooth'});
  else document.getElementById('data-tbody').lastElementChild?.scrollIntoView({behavior:'smooth'});
}
function deleteRow(i) { const e = getCurrentEntries(); if (!confirm(`刪除第 ${e[i].month} 月？`)) return; e.splice(i,1); e.forEach((x,j)=>x.month=j+1); render(); }

function onSettingsChange() {
  const s = getCurrentSettings();
  s.target = parseFloat(document.getElementById('s-target').value)||0; s.current = parseFloat(document.getElementById('s-current').value)||0;
  s.months = parseInt(document.getElementById('s-months').value)||120; s.monthlyReturn = parseFloat(document.getElementById('s-return').value)||0;
  s.monthlyInflation = parseFloat(document.getElementById('s-inflation').value)||0; s.etf = document.getElementById('s-etf').value||'';
  render();
}

function toggleSettings() { document.getElementById('settings-panel').classList.toggle('collapsed'); }

function saveToStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ pages, currentPageIndex, version: 1 })); }
function loadFromStorage() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) { try { const d = JSON.parse(raw); if (d.pages) pages = d.pages; if (d.currentPageIndex != null) currentPageIndex = d.currentPageIndex; } catch(e){} }
  const gasUrl = localStorage.getItem(GAS_URL_KEY);
  if (gasUrl) document.getElementById('gas-url').value = gasUrl;
}

function saveGasUrl() { const url = document.getElementById('gas-url').value.trim(); if (url) { localStorage.setItem(GAS_URL_KEY, url); setSyncStatus('URL 已儲存', 'synced'); } }

async function saveToSheet() {
  const url = localStorage.getItem(GAS_URL_KEY);
  if (!url) { saveToStorage(); hasUnsavedChanges = false; setSyncStatus('已儲存 (本地)', 'synced'); return; }
  setSyncStatus('儲存中...', '');
  try { await fetch(url, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ pages, version: 1 }) }); hasUnsavedChanges = false; setSyncStatus('已儲存 ' + new Date().toLocaleTimeString(), 'synced'); }
  catch (err) { setSyncStatus('儲存失敗', 'error'); }
}

async function loadFromSheet() {
  const url = localStorage.getItem(GAS_URL_KEY); if (!url) return;
  try { const resp = await fetch(url+'?action=load'); const data = await resp.json(); if (data.pages) { pages = data.pages; currentPageIndex = 0; renderTabs(); loadPageToUI(); render(); setSyncStatus('已載入', 'synced'); } } catch(e){}
}

function setSyncStatus(t, c) { const el = document.getElementById('sync-status'); el.textContent = t; el.className = 'sync-status ' + (c||''); }

window.addEventListener('resize', () => { renderChart(); });

if (sessionStorage.getItem('etf-multi-authed') === '1') { showApp(); }
</script>
</body>
</html>
